name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          check-latest: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Unit Tests
        run: go run github.com/rakyll/gotest@latest ./stream/... ./internal/... -count=1 -timeout=120s -v
      - name: Race Detection
        run: go test ./stream/... ./internal/... -race -count=1 -timeout=120s
      - name: Integration Build Check
        run: go build -tags integration ./...

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
      - name: Benchmarks
        run: go test ./stream/... -bench=. -benchtime=1x -count=1 -timeout=120s
